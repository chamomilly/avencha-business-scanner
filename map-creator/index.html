<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap');
    </style>
    <title>Advencha</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../scanner/style.css">
</head>

<body>
    <div class="container">
        <img src="../scanner/resources/logo.svg" alt="Advencha">

        <h2>Admin Login</h2>

        <div id="login-form" style="max-width: 400px; margin: 0 auto;">
            <input type="email" id="email" placeholder="Email"
                style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-family: 'Baloo 2', sans-serif;">
            <input type="password" id="password" placeholder="Password"
                style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-family: 'Baloo 2', sans-serif;">
            <button onclick="login()" class="redeem-btn" style="width: 100%;">LOGIN</button>
            <div id="message" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
